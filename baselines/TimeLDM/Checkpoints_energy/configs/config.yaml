dataloader:
  batch_size: 64
  sample_size: 1024
  shuffle: true
  train_dataset:
    params:
      data_root: ../../processed/energy_data
      name: energy
      seed: 123
      split: train
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
  valid_dataset:
    params:
      data_root: ../../processed/energy_data
      name: energy
      seed: 123
      split: valid
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
ldm_model:
  params:
    dropout: 0.0
    hidden_dim: 1024
    latent_dim: 32
    num_layers: 4
    seq_len: 128
  target: models.ldm.LDMDenoiser
solver:
  ldm:
    base_lr: 0.0001
    eval_every: 500
    max_epochs: 1000
    num_sampling_steps: 200
    results_folder: ./Checkpoints_energy/ldm
    t_max: 1.0
    t_min: 0.01
  vae:
    base_lr: 0.001
    eval_every: 100
    lambda1: 1.0
    lambda2: 1.0
    lambda3: 1.0
    max_epochs: 500
    results_folder: ./Checkpoints_energy/vae/LR0.001-BS64
vae_model:
  params:
    beta_lambda: 0.7
    beta_max: 0.01
    beta_min: 1.0e-05
    beta_patience: 50
    dec_layers: 3
    dropout: 0.1
    enc_layers: 2
    input_dim: 28
    latent_dim: 32
    num_heads: 4
    seq_len: 128
  target: models.vae.VAE
