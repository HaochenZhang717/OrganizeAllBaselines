dataloader:
  batch_size: 128
  sample_size: 256
  shuffle: true
  train_dataset:
    params:
      data_root: ../../processed/ETTh1
      name: etth1
      seed: 123
      split: train
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
  valid_dataset:
    params:
      data_root: ../../processed/ETTh1
      name: etth1
      seed: 123
      split: valid
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
model:
  params:
    attn_pd: 0.0
    beta_schedule: cosine
    d_model: 64
    feature_size: 7
    kernel_size: 1
    loss_type: l1
    mlp_hidden_times: 4
    n_heads: 4
    n_layer_dec: 2
    n_layer_enc: 3
    padding_size: 0
    resid_pd: 0.0
    sampling_timesteps: 500
    seq_length: 128
    timesteps: 500
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
solver:
  base_lr: 1.0e-05
  max_epochs: 18000
  results_folder: ./Checkpoints_etth/LR1e-05-BS128
  scheduler:
    params:
      factor: 0.5
      min_lr: 1.0e-05
      patience: 4000
      threshold: 0.1
      threshold_mode: rel
      verbose: false
      warmup: 500
      warmup_lr: 0.0008
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
