model:
  target: Models.interpretable_diffusion.gaussian_diffusion.Diffusion_TS
  params:
    seq_length: 128
    feature_size: 28
    n_layer_enc: 4
    n_layer_dec: 3
    d_model: 96  # 4 X 24
    timesteps: 1000
    sampling_timesteps: 1000
    loss_type: 'l1'
    beta_schedule: 'cosine'
    n_heads: 4
    mlp_hidden_times: 4
    attn_pd: 0.0
    resid_pd: 0.0
    kernel_size: 1
    padding_size: 0

solver:
  base_lr: 1.0e-5
  max_epochs: 25000
  results_folder: ./Checkpoints_energy
  gradient_accumulate_every: 2
  save_cycle: 2500  # max_epochs // 10
  ema:
    decay: 0.995
    update_interval: 10

  scheduler:
    target: engine.lr_sch.ReduceLROnPlateauWithWarmup
    params:
      factor: 0.5
      patience: 5000
      min_lr: 1.0e-5
      threshold: 1.0e-1
      threshold_mode: rel
      warmup_lr: 8.0e-4
      warmup: 500
      verbose: False

dataloader:
  train_dataset:
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
    params:
      name: energy
      data_root: ../../processed/energy_data
      split: train
      seed: 123

  valid_dataset:
    target: Utils.Data_utils.npy_datasets.PreSplitNPYDataset
    params:
      name: energy
      data_root: ../../processed/energy_data
      split: valid
      seed: 123

  batch_size: 64
  sample_size: 256
  shuffle: True